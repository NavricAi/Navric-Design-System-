<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Spacing · 4px base grid</p>
<div style="display:flex;flex-direction:column;gap:11px">
  
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:4px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">4px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:8px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">8px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:12px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">12px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:16px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">16px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:24px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">24px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:32px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">32px</span></div>
  <div style="display:flex;align-items:center;gap:14px"><div style="height:14px;width:48px;background:var(--indigo);border-radius:3px"></div><span class="mono" style="font-size:12px;color:var(--fg2)">48px</span></div>
</div><script>lucide.createIcons();</script></body></html>
