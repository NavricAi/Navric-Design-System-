<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Neutrals · light</p>
<div class="row" style="gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
  
  <div style="flex:1"><div style="height:60px;background:#F8FAFC;border-right:1px solid var(--border-faint)"></div>
  <div style="padding:8px 6px;text-align:center;background:var(--surface)"><div style="font-size:11px;font-weight:500">canvas</div><div class="hex" style="margin-top:2px">#F8FAFC</div></div></div>
  <div style="flex:1"><div style="height:60px;background:#FFFFFF;border-right:1px solid var(--border-faint)"></div>
  <div style="padding:8px 6px;text-align:center;background:var(--surface)"><div style="font-size:11px;font-weight:500">surface</div><div class="hex" style="margin-top:2px">#FFFFFF</div></div></div>
  <div style="flex:1"><div style="height:60px;background:#F1F5F9;border-right:1px solid var(--border-faint)"></div>
  <div style="padding:8px 6px;text-align:center;background:var(--surface)"><div style="font-size:11px;font-weight:500">sunken</div><div class="hex" style="margin-top:2px">#F1F5F9</div></div></div>
  <div style="flex:1"><div style="height:60px;background:#E2E8F0;border-right:1px solid var(--border-faint)"></div>
  <div style="padding:8px 6px;text-align:center;background:var(--surface)"><div style="font-size:11px;font-weight:500">border</div><div class="hex" style="margin-top:2px">#E2E8F0</div></div></div>
  <div style="flex:1"><div style="height:60px;background:#CBD5E1;border-right:1px solid var(--border-faint)"></div>
  <div style="padding:8px 6px;text-align:center;background:var(--surface)"><div style="font-size:11px;font-weight:500">border+</div><div class="hex" style="margin-top:2px">#CBD5E1</div></div></div>
</div>
<div style="display:flex;gap:24px;margin-top:18px">
  <div><div style="color:#0F172A;font-size:16px;font-weight:600">Primary text</div><div class="hex">fg1 · #0F172A</div></div>
  <div><div style="color:#475569;font-size:16px;font-weight:500">Secondary</div><div class="hex">fg2 · #475569</div></div>
  <div><div style="color:#94A3B8;font-size:16px">Muted</div><div class="hex">fg3 · #94A3B8</div></div>
</div><script>lucide.createIcons();</script></body></html>
