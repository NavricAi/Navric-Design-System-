<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Elevation · depth from hairlines, not heavy shadow</p>
<div class="row" style="gap:18px">
  
  <div style="text-align:center"><div style="width:96px;height:62px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-xs)"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:12px">xs</div></div>
  <div style="text-align:center"><div style="width:96px;height:62px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm)"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:12px">sm</div></div>
  <div style="text-align:center"><div style="width:96px;height:62px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-ambient)"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:12px">ambient</div></div>
  <div style="text-align:center"><div style="width:96px;height:62px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-md)"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:12px">md</div></div>
  <div style="text-align:center"><div style="width:96px;height:62px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-pop)"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:12px">pop</div></div>
</div><script>lucide.createIcons();</script></body></html>
