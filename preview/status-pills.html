<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Status & trend pills</p>
<div class="row" style="align-items:center">
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--teal-text);background:var(--teal-tint);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);padding:3px 10px;border-radius:9999px"><i data-lucide="circle-check-big" style="color:var(--teal)"></i> Authority Active</span>
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--teal-text);background:var(--teal-tint);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);padding:3px 10px;border-radius:9999px"><i data-lucide="trending-down" style="color:var(--teal)"></i> Improving</span>
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--fg2);border:1px solid var(--border);padding:3px 10px;border-radius:9999px"><i data-lucide="circle-gauge"></i> Confidence: High</span>
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--indigo);border:1px solid var(--indigo);background:var(--indigo-tint);padding:3px 10px;border-radius:9999px"><i data-lucide="bell"></i> Watchlist</span>
</div>
<p style="font-size:11.5px;color:var(--fg3);margin:16px 0 0">Teal appears ONLY for improving signals — never competes with risk color.</p><script>lucide.createIcons();</script></body></html>
