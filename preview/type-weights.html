<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Weights & labels</p>
<div style="display:flex;gap:26px;align-items:baseline;flex-wrap:wrap;margin-bottom:18px">
  <span style="font-weight:300;font-size:22px">Light 300</span>
  <span style="font-weight:400;font-size:22px">Regular 400</span>
  <span style="font-weight:500;font-size:22px">Medium 500</span>
  <span style="font-weight:600;font-size:22px">Semibold 600</span>
</div>
<div style="display:flex;gap:30px;align-items:center">
  <div><div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)">Out-of-service rates</div><div class="cap" style="margin-top:6px">Eyebrow · 12 / 500 / +.08em</div></div>
  <div><span style="font:300 28px/1 var(--font-sans);letter-spacing:.22em">NAVRIC</span><div class="cap" style="margin-top:6px">Wordmark · 300 / +.22em</div></div>
</div><script>lucide.createIcons();</script></body></html>
