<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Inputs</p>
<div style="display:flex;flex-direction:column;gap:14px;max-width:340px">
  <div style="display:flex;align-items:center;gap:8px;height:40px;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--fg3)"><i data-lucide="search"></i><span style="font-size:13.5px">Search by USDOT or name</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 12px;background:var(--surface);border:1px solid var(--indigo);border-radius:8px;box-shadow:var(--ring);color:var(--fg1)"><span style="font-size:13.5px">Sunbelt Freight Logistics LLC</span><i data-lucide="chevron-down" style="color:var(--fg3)"></i></div>
  <div class="cap">Default · focused (accent ring)</div>
</div><script>lucide.createIcons();</script></body></html>
