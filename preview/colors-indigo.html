<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Accent · Navy ink · the one accent</p>
<div class="row" style="gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
  
  <div style="flex:1"><div style="height:72px;background:#EDF0F7"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">tint</div><div class="hex" style="margin-top:3px">#EDF0F7</div></div></div>
  <div style="flex:1"><div style="height:72px;background:#DCE2EF"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">tint-2</div><div class="hex" style="margin-top:3px">#DCE2EF</div></div></div>
  <div style="flex:1"><div style="height:72px;background:#2E3C7A"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">light</div><div class="hex" style="margin-top:3px">#2E3C7A</div></div></div>
  <div style="flex:1"><div style="height:72px;background:#15205A"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">base</div><div class="hex" style="margin-top:3px">#15205A</div></div></div>
  <div style="flex:1"><div style="height:72px;background:#0B1437"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">hover</div><div class="hex" style="margin-top:3px">#0B1437</div></div></div>
  <div style="flex:1"><div style="height:72px;background:#060C20"></div>
  <div style="padding:8px 6px 10px;text-align:center"><div style="font-size:11.5px;font-weight:500">active</div><div class="hex" style="margin-top:3px">#060C20</div></div></div>
</div><script>lucide.createIcons();</script></body></html>
