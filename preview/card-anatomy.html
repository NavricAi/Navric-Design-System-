<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Card</p>
<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm);padding:22px 24px;max-width:420px">
  <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0;font:600 17px/1 var(--font-sans)">Risk by dimension</h3><a style="font-size:12.5px;color:var(--indigo);font-weight:500">View methodology</a></div>
  <p style="font-size:12.5px;color:var(--fg3);margin:6px 0 0">0–100 risk index · higher is worse</p>
  <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border-faint);font-size:13px;color:var(--fg2)">Hairline border · 12px radius · soft ambient shadow · 22–24px padding.</div>
</div><script>lucide.createIcons();</script></body></html>
