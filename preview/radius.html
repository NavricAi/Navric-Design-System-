<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Radius · soft, never pill</p>
<div class="row" style="align-items:flex-end">
  
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:4px 4px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">4px</div><div class="cap">xs</div></div>
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:8px 8px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">8px</div><div class="cap">base</div></div>
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:10px 10px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">10px</div><div class="cap">md</div></div>
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:12px 12px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">12px</div><div class="cap">lg · card</div></div>
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:16px 16px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">16px</div><div class="cap">xl</div></div>
  <div style="text-align:center"><div style="width:74px;height:60px;background:var(--indigo-tint);border:1px solid var(--indigo);border-bottom:none;border-radius:20px 20px 0 0"></div>
  <div style="font-size:11.5px;font-weight:500;margin-top:8px">20px</div><div class="cap">2xl</div></div>
</div>
<p style="font-size:11.5px;color:var(--fg3);margin:16px 0 0">9999px reserved for status dots & small pills only.</p><script>lucide.createIcons();</script></body></html>
