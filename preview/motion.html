<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Motion · fast & calm · no bounce</p>
<div style="display:flex;gap:28px;align-items:center">
  <svg width="150" height="90" viewBox="0 0 150 90"><path d="M8 82 C 38 82, 50 8, 142 8" fill="none" stroke="var(--indigo)" stroke-width="2.5"/><line x1="8" y1="82" x2="8" y2="8" stroke="var(--border)"/><line x1="8" y1="82" x2="142" y2="82" stroke="var(--border)"/></svg>
  <div style="font-family:var(--font-mono);font-size:12.5px;line-height:2;color:var(--fg2)">
    <div>fast&nbsp;&nbsp;<span style="color:var(--fg1)">120ms</span></div>
    <div>base&nbsp;&nbsp;<span style="color:var(--fg1)">180ms</span></div>
    <div>slow&nbsp;&nbsp;<span style="color:var(--fg1)">260ms</span></div>
    <div style="margin-top:6px;font-size:11px;color:var(--fg3)">cubic-bezier(.2,0,0,1)</div>
  </div>
</div><script>lucide.createIcons();</script></body></html>
