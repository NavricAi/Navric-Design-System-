<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Numerics · Geist Mono · tabular</p>
<div style="display:flex;gap:32px;align-items:flex-start">
  <div>
    <div style="font-family:var(--font-mono);font-size:52px;font-weight:600;letter-spacing:-.02em;color:var(--sev-sev-ink)">82</div>
    <div class="cap">risk index</div>
  </div>
  <div style="font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:14px;line-height:1.9;color:var(--fg2)">
    <div>USDOT 2143875</div>
    <div>23.4%&nbsp;&nbsp;national avg</div>
    <div style="color:var(--sev-sev-ink)">+8.1&nbsp;&nbsp;over threshold</div>
    <div style="color:var(--teal-text)">−1.1 pts&nbsp;&nbsp;improving</div>
  </div>
  <div style="font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:14px;line-height:1.9;text-align:right;border-left:1px solid var(--border);padding-left:20px">
    <div>1,204</div><div>82.0</div><div>9.7</div><div>148</div>
  </div>
</div><script>lucide.createIcons();</script></body></html>
