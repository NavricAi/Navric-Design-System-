<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Type scale · Geist</p>
<div style="display:flex;flex-direction:column;gap:13px">
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font:600 40px/1 var(--font-sans);letter-spacing:-.02em">Display</span><span class="hex">40 / 600</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font:600 30px/1 var(--font-sans);letter-spacing:-.02em">Heading 1</span><span class="hex">30 / 600</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font:600 22px/1 var(--font-sans);letter-spacing:-.02em">Heading 2</span><span class="hex">22 / 600</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font:600 17px/1 var(--font-sans)">Heading 3</span><span class="hex">17 / 600</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font:400 14px/1 var(--font-sans);color:var(--fg2)">Body — the verdict leads, then the driver.</span><span class="hex">14 / 400</span></div>
</div><script>lucide.createIcons();</script></body></html>
