<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:22px 26px;background:var(--canvas);color:var(--fg1);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
.lab{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin:0 0 16px}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.row{display:flex;gap:14px;flex-wrap:wrap}
[data-lucide]{width:1em;height:1em;stroke-width:1.75;vertical-align:middle}
.hex{font-family:var(--font-mono);font-size:11.5px;color:var(--fg3);margin-top:7px;letter-spacing:-.01em}
.nm{font-size:12.5px;font-weight:500;color:var(--fg1);margin-top:10px}
.cap{font-size:11px;color:var(--fg3);margin-top:2px}
</style></head><body class="navric">
<p class="lab">Brand · fixed</p>
<div class="row">
  <div style="flex:1">
    <div style="height:78px;border-radius:12px;background:#0B1437"></div>
    <div class="nm">Navy</div><div class="cap">App chrome / dark ground</div><div class="hex">#0B1437</div>
  </div>
  <div style="flex:1">
    <div style="height:78px;border-radius:12px;background:#15205A"></div>
    <div class="nm">Navy ink</div><div class="cap">Primary · accent · focus</div><div class="hex">#15205A</div>
  </div>
  <div style="flex:1">
    <div style="height:78px;border-radius:12px;background:#14B8A6"></div>
    <div class="nm">Teal</div><div class="cap">"Improving" trend only</div><div class="hex">#14B8A6</div>
  </div>
</div><script>lucide.createIcons();</script></body></html>
