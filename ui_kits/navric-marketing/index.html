<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navric — Carrier Risk Intelligence</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--canvas); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  [data-lucide] { stroke-width: 1.75; }
  .dotted-bg { background-image: radial-gradient(circle, var(--border-strong) 1px, transparent 1px); background-size: 22px 22px; }
  .m-mobile { display: none !important; }
  @media (max-width: 860px) {
    .m-desktop { display: none !important; }
    .m-mobile { display: inline-flex !important; }
    .hero-grid, .feat-grid, .price-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body class="navric">
<div id="root"></div>

<script type="text/babel" src="MarketShell.jsx"></script>
<script type="text/babel" src="MarketPage.jsx"></script>
<script type="text/babel">
  function App() {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <div style={{ background: 'var(--canvas)' }}>
        <Navbar />
        <Hero />
        <Features />
        <Pricing />
        <CTA />
        <Footer />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
