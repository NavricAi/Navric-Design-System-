<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navric Platform — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { background: var(--canvas); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  [data-lucide] { stroke-width: 1.75; }
  .basic-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong) !important; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 9999px; border: 3px solid var(--canvas); }
</style>
</head>
<body class="navric">
<div id="root"></div>

<script src="platform-data.js"></script>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Inspections.jsx"></script>
<script type="text/babel" src="Assistant.jsx"></script>
<script type="text/babel">
  function App() {
    const [view, setView] = useState('dashboard');
    const [theme, setTheme] = useState('light');

    useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
    }, [theme]);

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    const titles = { dashboard: 'Fleet dashboard', inspections: 'Inspections', assistant: 'Assistant' };

    return (
      <div style={{ display: 'flex', height: '100%', background: 'var(--canvas)' }}>
        <LeftNav active={view} onNav={setView} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <TopBar title={titles[view]} theme={theme} onTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
          <CarrierContextBar />
          {view === 'dashboard' && <Dashboard />}
          {view === 'inspections' && <Inspections />}
          {view === 'assistant' && <Assistant />}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
